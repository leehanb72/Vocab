<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1a15">
<title>Add a Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1a15;--bg-deep:#0a130f;--surface:#1a2a22;--surface-2:#16241d;
    --surface-line:rgba(243,236,217,0.14);--ink:#f4eedc;--ink-soft:#9fb6aa;
    --gold:#d8ad3d;--gold-soft:#ecd791;--rust:#e3835f;--rust-bg:rgba(227,131,95,0.16);
    --green:#86c08c;--blue:#7db8d4;--blue-bg:rgba(125,184,212,0.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{min-height:100dvh;background:radial-gradient(130% 140% at 50% -10%,var(--bg),var(--bg-deep));font-family:'Inter',system-ui,sans-serif;color:var(--ink);}
  .wrap{max-width:560px;margin:0 auto;padding:max(22px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(28px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2rem,7vw,2.7rem);margin:6px 0 22px;line-height:1.05;}
  .card{background:linear-gradient(180deg,var(--surface),var(--surface-2));border:1px solid var(--surface-line);border-radius:16px;padding:20px 18px 22px;animation:rise .5s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .field{margin-bottom:16px;}
  label{display:block;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:7px;}
  label .opt{color:var(--ink-soft);text-transform:none;letter-spacing:0;font-size:11px;}
  input,textarea{width:100%;background:var(--bg-deep);border:1px solid var(--surface-line);border-radius:10px;color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;padding:13px 14px;resize:vertical;}
  input::placeholder,textarea::placeholder{color:rgba(159,182,170,0.55);}
  input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(216,173,61,0.18);}
  textarea{min-height:62px;line-height:1.45;}

  /* ── buttons ── */
  .btn-row{display:flex;gap:8px;margin-bottom:0;}
  .btn{flex:1;border:none;border-radius:10px;padding:15px 8px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .15s,color .15s,border-color .15s;}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn-add{background:var(--gold);color:var(--bg-deep);}
  .btn-add:hover:not(:disabled){background:var(--gold-soft);}
  .btn-lookup{background:var(--surface);color:var(--ink);border:1px solid var(--surface-line);}
  .btn-lookup:hover:not(:disabled){background:rgba(159,182,170,0.12);}
  .btn-clear{flex:0 0 72px;background:transparent;color:var(--ink-soft);border:1px solid var(--surface-line);}
  .btn-clear:hover:not(:disabled){color:var(--rust);border-color:var(--rust);}

  /* ── confirm bar ── */
  .confirm-bar{
    margin-top:14px;background:var(--blue-bg);border:1px solid rgba(125,184,212,0.35);
    border-radius:12px;padding:14px 15px 12px;display:none;
  }
  .confirm-bar.warn{background:var(--rust-bg);border-color:rgba(227,131,95,0.4);}
  .confirm-msg{font-size:14px;line-height:1.5;margin-bottom:12px;color:var(--ink);}
  .confirm-msg strong{color:var(--gold-soft);}
  .confirm-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .cbtn{flex:1;min-width:0;padding:11px 8px;border:none;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
  .cbtn-primary{background:var(--gold);color:var(--bg-deep);}
  .cbtn-primary:hover{background:var(--gold-soft);}
  .cbtn-secondary{background:var(--surface);color:var(--ink);border:1px solid var(--surface-line);}
  .cbtn-secondary:hover{background:rgba(159,182,170,0.12);}
  .cbtn-cancel{background:transparent;color:var(--ink-soft);border:1px solid var(--surface-line);}
  .cbtn-cancel:hover{color:var(--rust);border-color:var(--rust);}

  .status{margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:13px;text-align:center;min-height:18px;line-height:1.5;}
  .status.ok{color:var(--green);}
  .status.err{color:var(--rust);}
  .status.warn{color:var(--gold-soft);}
  .status.info{color:var(--blue);}
  .hint{font-size:12.5px;color:var(--ink-soft);margin-top:12px;text-align:center;line-height:1.5;}

  /* ── ledger ── */
  .ledger{margin-top:30px;}
  .ledger-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--surface-line);padding-bottom:9px;margin-bottom:6px;}
  .ledger-head .eyebrow{color:var(--ink-soft);}
  .ledger-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold-soft);}
  .ledger-empty{color:var(--ink-soft);font-size:14px;padding:16px 2px;line-height:1.5;}
  .entry{padding:13px 2px;border-bottom:1px solid rgba(243,236,217,0.07);animation:slidein .35s ease both;}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
  .entry-word{font-family:'Fraunces',serif;font-weight:600;font-size:1.15rem;margin-bottom:2px;}
  .entry-meaning{font-size:14px;color:var(--ink-soft);line-height:1.45;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Vocabulary · Add</div>
  <h1>Add a word</h1>
  <div class="card">
    <div class="field">
      <label for="word">Word</label>
      <input id="word" type="text" autocapitalize="none" autocomplete="off" placeholder="e.g. Serendipity">
    </div>
    <div class="field">
      <label for="meaning">Meaning <span class="opt">— auto-generated if blank</span></label>
      <textarea id="meaning" placeholder="e.g. Good luck in making unexpected, fortunate discoveries."></textarea>
    </div>
    <div class="field" style="margin-bottom:20px;">
      <label for="example">Example <span class="opt">— auto-generated if blank</span></label>
      <textarea id="example" placeholder="e.g. Their meeting was pure serendipity."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-clear"  id="clearBtn">Clear</button>
      <button class="btn btn-lookup" id="lookupBtn">Look up</button>
      <button class="btn btn-add"    id="addBtn">Add word</button>
    </div>

    <!-- Confirm bar: shown after validation when a suggestion exists or before saving -->
    <div class="confirm-bar" id="confirmBar">
      <div class="confirm-msg" id="confirmMsg"></div>
      <div class="confirm-btns" id="confirmBtns"></div>
    </div>

    <div class="status" id="status"></div>
    <div class="hint">Only the word is required. Blank fields are auto-generated by Claude.</div>
  </div>

  <div class="ledger">
    <div class="ledger-head">
      <span class="eyebrow">Added this session</span>
      <span class="ledger-count" id="count">0</span>
    </div>
    <div id="ledgerBody">
      <div class="ledger-empty" id="ledgerEmpty">Nothing added yet. Words you add will appear here.</div>
    </div>
  </div>
</div>

<script>
const ENDPOINT_URL = 'https://script.google.com/macros/s/AKfycbwgTH52c33lZM3KKvx19Ttuuy8PAxvm37WSbbyhbm49eTpLCy34-Sy3jsuBe2PZOSDzSA/exec';
const SHEET_CSV    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSULPIxbDX4y9FHYQyQTgRKuxkdrcXvTdb3zDCDkIY3AUXD07SrF5VGwMTBBl2NOJkMwjAT0fDo_k1L/pub?gid=0&single=true&output=csv';

const wordEl      = document.getElementById('word');
const meaningEl   = document.getElementById('meaning');
const exampleEl   = document.getElementById('example');
const addBtn      = document.getElementById('addBtn');
const lookupBtn   = document.getElementById('lookupBtn');
const clearBtn    = document.getElementById('clearBtn');
const statusEl    = document.getElementById('status');
const confirmBar  = document.getElementById('confirmBar');
const confirmMsg  = document.getElementById('confirmMsg');
const confirmBtns = document.getElementById('confirmBtns');
const countEl     = document.getElementById('count');
const ledgerBody  = document.getElementById('ledgerBody');
let   ledgerEmpty = document.getElementById('ledgerEmpty');
let   added       = 0;
let   sheetCache  = null;
let   autoFilled  = false; // true when boxes were filled by lookup/generate, not by the user

// ── Clear boxes when user edits the word field ──────────────────
wordEl.addEventListener('input', () => {
  if (autoFilled) {
    meaningEl.value = '';
    exampleEl.value = '';
    autoFilled = false;
  }
  hideConfirm();
  setStatus('');
});

// ── CSV parser ──────────────────────────────────────────────────
function parseCSV(text){
  const rows=[];let row=[],field='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(inQ){if(c==='"'&&n==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else{field+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){row.push(field);field='';}
    else if(c==='\r'){}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
    else{field+=c;}}
  }
  if(field||row.length){row.push(field);rows.push(row);}
  return rows;
}

async function getSheet(){
  if(sheetCache) return sheetCache;
  const res  = await fetch(SHEET_CSV);
  const text = await res.text();
  let rows   = parseCSV(text).filter(r=>r.length>=1&&r[0].trim());
  if(rows[0]&&rows[0][0].toLowerCase().trim()==='word') rows=rows.slice(1);
  sheetCache = rows.map(r=>({
    word:(r[0]||'').trim(), meaning:(r[1]||'').trim(), example:(r[2]||'').trim()
  }));
  return sheetCache;
}

// Normalize for comparison: lowercase, strip punctuation, collapse spaces
function normalizePhrase(s){
  return s.toLowerCase()
          .replace(/[^a-z0-9\s]/g,' ')
          .replace(/\s+/g,' ')
          .trim();
}

// Does `needle` appear as a run of whole words inside `haystack`?
function containsPhrase(haystack, needle){
  if(!needle) return false;
  const h = ' ' + normalizePhrase(haystack) + ' ';
  const n = ' ' + normalizePhrase(needle)   + ' ';
  return h.indexOf(n) !== -1;
}

// Find an existing entry that exactly matches OR contains the typed phrase
// (or is contained by it), so "high and dry" matches "leave someone high and dry".
async function findInSheet(word){
  const rows  = await getSheet();
  const wNorm = normalizePhrase(word);
  if(!wNorm) return null;

  // 1. exact normalized match
  let hit = rows.find(r => normalizePhrase(r.word) === wNorm);
  if(hit) return hit;

  // 2. typed phrase contained within a stored entry, or stored entry within typed phrase.
  //    Require the SHORTER side to itself be multi-word, so a single common word
  //    like "high" inside "high and drier" doesn't trigger a false match.
  const isPhrase = wNorm.indexOf(' ') !== -1;
  if(isPhrase){
    hit = rows.find(r => {
      const rNorm = normalizePhrase(r.word);
      const shorter = wNorm.length <= rNorm.length ? wNorm : rNorm;
      if(shorter.indexOf(' ') === -1) return false; // shorter side must be multi-word
      return containsPhrase(r.word, word) || containsPhrase(word, r.word);
    });
    if(hit) return hit;
  }
  return null;
}

// ── UI helpers ──────────────────────────────────────────────────
function setStatus(msg, kind){
  statusEl.textContent = msg;
  statusEl.className   = 'status'+(kind?' '+kind:'');
}
function setBusy(busy){
  addBtn.disabled = lookupBtn.disabled = clearBtn.disabled = busy;
}
function fillBoxes(meaning, example){
  meaningEl.value = meaning || '';
  exampleEl.value = example || '';
  autoFilled = true;
}
function clearAll(){
  wordEl.value=''; meaningEl.value=''; exampleEl.value='';
  autoFilled=false; setStatus(''); hideConfirm(); wordEl.focus();
}
function showConfirm(html, buttons, isWarn){
  confirmMsg.innerHTML  = html;
  confirmBtns.innerHTML = '';
  buttons.forEach(b=>{
    const el = document.createElement('button');
    el.className   = 'cbtn ' + b.cls;
    el.textContent = b.label;
    el.onclick     = b.action;
    confirmBtns.appendChild(el);
  });
  confirmBar.className = 'confirm-bar' + (isWarn ? ' warn' : '');
  confirmBar.style.display = 'block';
}
function hideConfirm(){
  confirmBar.style.display = 'none';
  confirmBtns.innerHTML    = '';
}
function addToLedger(word, meaning){
  if(ledgerEmpty){ledgerEmpty.remove();ledgerEmpty=null;}
  const e=document.createElement('div'); e.className='entry';
  const w=document.createElement('div'); w.className='entry-word'; w.textContent=word;
  const m=document.createElement('div'); m.className='entry-meaning'; m.textContent=meaning||'(auto-generated)';
  e.appendChild(w); e.appendChild(m);
  ledgerBody.insertBefore(e, ledgerBody.firstChild);
  added++; countEl.textContent=added;
}

// ── Call Apps Script ────────────────────────────────────────────
async function callScript(payload){
  const res  = await fetch(ENDPOINT_URL, {
    method: 'POST',
    headers: {'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return await res.json();
}

async function saveToSheet(word, meaning, example){
  await callScript({ action:'add', word, meaning, example });
  // Keep the in-memory cache fresh by appending, rather than forcing a full
  // re-download of the whole word list on the next action.
  if(sheetCache){
    sheetCache.push({ word:word.trim(), meaning:(meaning||'').trim(), example:(example||'').trim() });
  }
  addToLedger(word, meaning);
}

// ── Validate a new word via Claude ──────────────────────────────
async function validateAndGenerate(word){
  // Always clear boxes first so there's no stale content
  meaningEl.value=''; exampleEl.value=''; autoFilled=false;
  setStatus('Checking spelling and generating…','');
  const data = await callScript({ action:'validate', word });

  // If Claude corrected the phrase, check whether the corrected form
  // already exists in the sheet (e.g. "high and dry" inside
  // "leave someone high and dry"). Attach it so the caller can warn.
  data.relatedMatch = null;
  if(data && !data.valid && data.suggestion){
    data.relatedMatch = await findInSheet(data.suggestion);
  }
  setStatus(''); // clear the "Checking…" message before the caller shows its own status/confirm
  return data; // {ok, valid, suggestion, meaning, example, relatedMatch}
}

// ── ADD button ──────────────────────────────────────────────────
async function submitWord(){
  const word = wordEl.value.trim();
  if(!word){ setStatus('Enter a word first.','err'); wordEl.focus(); return; }

  setBusy(true); addBtn.textContent='Checking…'; setStatus(''); hideConfirm();

  try{
    const existing = await findInSheet(word);
    if(existing){
      fillBoxes(existing.meaning, existing.example);
      setStatus('"'+word+'" is already in your sheet — filled above.','warn');
      setBusy(false); addBtn.textContent='Add word'; return;
    }

    // New word — validate spelling first
    const result = await validateAndGenerate(word);
    fillBoxes(result.meaning, result.example);

    // If the corrected phrase is already covered by an existing entry, stop here
    if(!result.valid && result.relatedMatch){
      fillBoxes(result.relatedMatch.meaning, result.relatedMatch.example);
      setStatus('Already in your sheet as "'+result.relatedMatch.word+'" — nothing added.','warn');
      setBusy(false); addBtn.textContent='Add word'; return;
    }

    if(result.valid){
      // Correct spelling — confirm before saving
      showConfirm(
        'Ready to add <strong>"'+word+'"</strong> to your sheet.',
        [
          { label:'Confirm add', cls:'cbtn-primary',   action: async()=>{ hideConfirm(); setBusy(true); addBtn.textContent='Saving…'; await saveToSheet(word,result.meaning,result.example); setStatus('"'+word+'" added to your sheet.','ok'); wordEl.value=''; autoFilled=false; setBusy(false); addBtn.textContent='Add word'; } },
          { label:'Cancel',      cls:'cbtn-cancel',    action: ()=>{ hideConfirm(); setStatus(''); } }
        ], false
      );
    } else {
      // Possible misspelling — show suggestion
      const suggestion = result.suggestion || word;
      showConfirm(
        'Did you mean <strong>"'+suggestion+'"</strong>? The meaning and example above are for the corrected form.',
        [
          { label:'Use "'+suggestion+'"', cls:'cbtn-primary',   action: async()=>{ hideConfirm(); setBusy(true); addBtn.textContent='Saving…'; wordEl.value=suggestion; await saveToSheet(suggestion,result.meaning,result.example); setStatus('"'+suggestion+'" added to your sheet.','ok'); wordEl.value=''; autoFilled=false; setBusy(false); addBtn.textContent='Add word'; } },
          { label:'Add as typed',         cls:'cbtn-secondary', action: async()=>{ hideConfirm(); setBusy(true); addBtn.textContent='Saving…'; await saveToSheet(word,result.meaning,result.example); setStatus('"'+word+'" added to your sheet.','ok'); wordEl.value=''; autoFilled=false; setBusy(false); addBtn.textContent='Add word'; } },
          { label:'Cancel',               cls:'cbtn-cancel',    action: ()=>{ hideConfirm(); setStatus(''); } }
        ], true
      );
    }

  }catch(err){
    setStatus("Couldn't reach the sheet. Check your connection.",'err');
  }finally{
    addBtn.textContent='Add word';
    setBusy(false);
  }
}

// ── LOOK UP button ──────────────────────────────────────────────
async function lookupWord(){
  const word = wordEl.value.trim();
  if(!word){ setStatus('Enter a word to look up.','err'); wordEl.focus(); return; }

  setBusy(true); lookupBtn.textContent='Looking…'; setStatus(''); hideConfirm();

  try{
    const existing = await findInSheet(word);
    if(existing){
      fillBoxes(existing.meaning, existing.example);
      setStatus('Found "'+word+'" in your sheet.','ok');
    }else{
      // Not in sheet — validate then offer to add
      const result = await validateAndGenerate(word);
      fillBoxes(result.meaning, result.example);

      // If the corrected phrase is already covered by an existing entry, stop here
      if(!result.valid && result.relatedMatch){
        fillBoxes(result.relatedMatch.meaning, result.relatedMatch.example);
        setStatus('Already in your sheet as "'+result.relatedMatch.word+'".','ok');
        setBusy(false); lookupBtn.textContent='Look up'; return;
      }

      if(result.valid){
        showConfirm(
          '"<strong>'+word+'</strong>" isn\'t in your sheet yet. Add it?',
          [
            { label:'Add to sheet', cls:'cbtn-primary',   action: async()=>{ hideConfirm(); setBusy(true); lookupBtn.textContent='Saving…'; await saveToSheet(word,result.meaning,result.example); setStatus('"'+word+'" added to your sheet.','ok'); wordEl.value=''; autoFilled=false; setBusy(false); lookupBtn.textContent='Look up'; } },
            { label:'Cancel',       cls:'cbtn-cancel',    action: ()=>{ hideConfirm(); setStatus(''); } }
          ], false
        );
      }else{
        const suggestion = result.suggestion || word;
        showConfirm(
          'Did you mean <strong>"'+suggestion+'"</strong>? The meaning and example above are for the corrected form.',
          [
            { label:'Add "'+suggestion+'"', cls:'cbtn-primary',   action: async()=>{ hideConfirm(); setBusy(true); lookupBtn.textContent='Saving…'; wordEl.value=suggestion; await saveToSheet(suggestion,result.meaning,result.example); setStatus('"'+suggestion+'" added to your sheet.','ok'); wordEl.value=''; autoFilled=false; setBusy(false); lookupBtn.textContent='Look up'; } },
            { label:'Add as typed',          cls:'cbtn-secondary', action: async()=>{ hideConfirm(); setBusy(true); lookupBtn.textContent='Saving…'; await saveToSheet(word,result.meaning,result.example); setStatus('"'+word+'" added to your sheet.','ok'); wordEl.value=''; autoFilled=false; setBusy(false); lookupBtn.textContent='Look up'; } },
            { label:'Cancel',                cls:'cbtn-cancel',    action: ()=>{ hideConfirm(); setStatus(''); } }
          ], true
        );
      }
    }
  }catch(err){
    setStatus("Couldn't reach the sheet. Check your connection.",'err');
  }finally{
    lookupBtn.textContent='Look up';
    setBusy(false);
  }
}

// ── Wire up ─────────────────────────────────────────────────────
clearBtn.addEventListener('click',  clearAll);
addBtn.addEventListener('click',    submitWord);
lookupBtn.addEventListener('click', lookupWord);

wordEl.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); meaningEl.focus(); }
});
[meaningEl,exampleEl].forEach(el=>{
  el.addEventListener('keydown', e=>{
    if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){ e.preventDefault(); submitWord(); }
  });
});

// Warm the word-list cache in the background as soon as the page loads,
// so the first Look up / Add isn't waiting on the full download.
getSheet().catch(()=>{ /* will retry on first real use */ });
</script>
</body>
</html>
